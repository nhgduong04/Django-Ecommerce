{% extends 'base.html' %}

{% block title %}Reset Email Sent - EShopper{% endblock %}

{% block content %}
<!-- Page Header Start -->
<div class="container-fluid bg-secondary mb-5">
    <div class="d-flex flex-column align-items-center justify-content-center" style="min-height: 150px">
        <h1 class="font-weight-semi-bold text-uppercase mb-3">Reset Password</h1>
        <div class="d-inline-flex">
            <p class="m-0"><a href="{% url 'home' %}">Home</a></p>
            <p class="m-0 px-2">-</p>
            <p class="m-0">Reset Password</p>
        </div>
    </div>
</div>
<!-- Page Header End -->

<div class="container-fluid pt-5">
    <div class="row px-xl-5 justify-content-center">
        <div class="col-lg-6 mb-5">
            <div class="card border-0 shadow-sm p-4">
                <div class="card-body text-center">
                    <h4 class="font-weight-bold mb-3">Check your email</h4>
                    <p class="text-muted mb-4">If an account exists for the email you entered, we’ve sent a password reset link.</p>
                    <a class="btn btn-primary py-2 px-4" href="{% url 'login' %}">Back to login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
